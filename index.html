<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" sizes="192x192" href="logo-192.png">
<link rel="apple-touch-icon" href="logo-192.png">
<link rel="manifest" href="manifest.json">



    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Codenix Hindi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050b14; --card-glass: rgba(15, 23, 42, 0.8); --blue: #2563eb; --yellow: #facc15; --text: #ffffff; --muted: #94a3b8; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; color: var(--text); }
        
        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background-image: radial-gradient(circle at top right, rgba(37,99,235,0.2), transparent 40%), radial-gradient(circle at bottom left, rgba(250,204,21,0.1), transparent 40%); }
        
        .auth-container { background: var(--card-glass); backdrop-filter: blur(15px); border: 1px solid var(--border); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo i { color: var(--blue); font-size: 28px; }
        .logo span { color: var(--yellow); font-size: 14px; }

        /* Tabs */
        .tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 25px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: var(--blue); color: white; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }

        /* Forms */
        form { display: none; text-align: left; animation: fadeIn 0.4s; }
        form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 18px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: var(--muted); }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; font-size: 14px; transition: 0.3s; }
        .input-group input:focus { border-color: var(--blue); background: rgba(0,0,0,0.6); }

        .submit-btn { width: 100%; padding: 12px; background: var(--blue); border: none; border-radius: 10px; color: white; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .submit-btn:hover { background: #1d4ed8; transform: translateY(-2px); }

        #statusMsg { margin-top: 15px; font-size: 13px; font-weight: 500; height: 20px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo"><i class="fas fa-laptop-code"></i> CODENIX <span>HINDI</span></div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <form id="loginForm" class="active">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="logEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="logPassword" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn">Login to Dashboard <i class="fas fa-arrow-right"></i></button>
        </form>

        <form id="signupForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="regEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="Create Password" required>
            </div>
            <button type="submit" class="submit-btn">Create Account <i class="fas fa-user-plus"></i></button>
        </form>

        <div id="statusMsg"></div>
    </div>

    <script>
        // --- AUTO LOGIN CHECK ---
        window.onload = function() {
            const userName = localStorage.getItem("codenix_user_name");
            const userRole = localStorage.getItem("codenix_user_role");
            
            if (userName && userRole) {
                if(userRole === "Admin") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "codenixhindi.html";
                }
            }
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydtK9KUc2ytUW42MPoMFvlU87zjVP0SF1C-8O-GWRKJvQ_dIP-aCE3ht4A8IrH56berQ/exec";

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('form').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
            document.getElementById('statusMsg').innerText = "";
        }

        function showMessage(msg, color) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.innerText = msg;
            statusDiv.style.color = color;
        }

        // --- SIGN UP LOGIC ---
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            showMessage("⏳ Creating account... Please wait.", "#facc15");
            document.querySelector('#signupForm .submit-btn').disabled = true;

            const data = {
                Name: document.getElementById('regName').value,
                Email: document.getElementById('regEmail').value,
                Password: document.getElementById('regPassword').value,
                Role: "Student" 
            };

            try {
                const response = await fetch(SCRIPT_URL + "?sheet=Users", {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await response.text();
                if(result === "Success") {
                    showMessage("✅ Account Created! Redirecting...", "#10b981");
                    
                    localStorage.setItem("codenix_user_name", data.Name);
                    localStorage.setItem("codenix_user_role", data.Role);
                    
                    setTimeout(() => { window.location.href = "codenixhindi.html"; }, 1500);
                } else {
                    showMessage("❌ Something went wrong.", "#ef4444");
                    document.querySelector('#signupForm .submit-btn').disabled = false;
                }
            } catch (error) {
                showMessage("❌ Internet Connection Error.", "#ef4444");
                document.querySelector('#signupForm .submit-btn').disabled = false;
            }
        });

        // --- LOGIN LOGIC ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            showMessage("⏳ Verifying details...", "#facc15");
            document.querySelector('#loginForm .submit-btn').disabled = true;

            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPassword').value;

            try {
                const response = await fetch(SCRIPT_URL + "?sheet=Users");
                const users = await response.json();
                
                const validUser = users.find(u => u.Email === email && u.Password === pass);

                if(validUser) {
                    showMessage("✅ Login Successful! Redirecting...", "#10b981");
                    
                    localStorage.setItem("codenix_user_name", validUser.Name);
                    localStorage.setItem("codenix_user_role", validUser.Role);
                    
                    setTimeout(() => {
                        if(validUser.Role === "Admin") {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "codenixhindi.html";
                        }
                    }, 1500);
                } else {
                    showMessage("❌ Invalid Email or Password.", "#ef4444");
                    document.querySelector('#loginForm .submit-btn').disabled = false;
                }
            } catch (error) {
                showMessage("❌ Internet Error.", "#ef4444");
                document.querySelector('#loginForm .submit-btn').disabled = false;
            }
        });
    </script>
</body>
</html>
